<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Salary & Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="page" role="main" aria-labelledby="app-title">
    <section class="auth-card" aria-label="Login form">
      <div class="brand">
        <div class="logo">₹</div>
        <h1 id="app-title">Salary & Attendance Portal</h1>
        <p class="subtitle">Sign in to manage payroll and daily attendance</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"/>
          </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
              minlength="8"
              aria-describedby="pwdError"
            />
            <button type="button" class="icon-btn" id="togglePassword" aria-label="Show password">
              <span class="eye" aria-hidden="true"></span>
            </button>
          </div>
          <div id="pwdError" class="error" role="alert" aria-live="polite"></div>
        </div>

        <div class="options">
          <label class="checkbox">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="link muted" id="forgotLink" aria-label="Forgot password">Forgot password?</a>
        </div>

        <button type="submit" class="btn primary" id="signInBtn">Sign in</button>
        <p>Or Sign in using</p>
        <div class="social-login">
  <button type="button"><img src="https://img.icons8.com/?size=48&id=22989&format=png" width="18" alt="Microsoft"> Microsoft  </button>
  <button type="button" id="googleLoginBtn"><img src="https://img.icons8.com/color/48/google-logo.png" width="18" alt="Google"> Google </button>
</div>

        <div class="form-footnote">
          By signing in, consent is given to attendance and payroll processing.</div>
      </form>
    
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
